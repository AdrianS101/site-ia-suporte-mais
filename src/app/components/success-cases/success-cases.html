<section id="cases" class="success-cases">
  <!-- Casos de Uso -->
  <div class="container">
    <div class="section-header">
      <h2 class="section-title">
        Casos de uso
        <span class="highlight">Uma central de suporte inteligente para diferentes equipes da sua empresa.</span>
      </h2>

      <div class="navigation-buttons">
        <button
          class="nav-button"
          (click)="previous()"
          aria-label="Caso anterior">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
        <button
          class="nav-button"
          (click)="next()"
          aria-label="Próximo caso">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </button>
      </div>
    </div>

    <!-- Cases Carousel -->
    <div class="cases-carousel">
      <div class="cases-wrapper">
        @for (case of visibleCases; track case.id) {
          <div class="case-card">
            <div class="case-content">
              <h3 class="case-company">{{ case.company }}</h3>
              <p class="case-description">{{ case.description }}</p>

              <a
                class="btn-case"
                href="https://wa.me/5511915192560?text=Ol%C3%A1%2C%20vim%20pelo%20site%20e%20gostaria%20de%20saber%20mais%20sobre%20a%20IA%20Suporte%2B%3F"
                target="_blank"
                rel="noopener noreferrer">Saiba mais</a>

              <div class="case-metrics">
                @for (metric of case.metrics; track $index) {
                  <div class="metric">
                    <div class="metric-value">{{ metric.value }}</div>
                    <div class="metric-label">{{ metric.label }}</div>
                    <div class="metric-sublabel">{{ metric.sublabel }}</div>
                  </div>
                }
              </div>
            </div>
          </div>
        }
      </div>
    </div>

    <!-- Progress Bar -->
    <div class="progress-bar">
      <div class="progress-fill" [style.width]="getProgressWidth()"></div>
    </div>
  </div>
</section>
