<section id="faq" class="faq" aria-labelledby="faq-title">
  <div class="container">
    <header class="section-header">
      <h2 id="faq-title" class="section-title">Perguntas frequentes</h2>
      <p class="section-subtitle">
        O que gestores de suporte, TI e operações costumam perguntar antes de
        levar a IA Suporte+ para a sua equipe.
      </p>
    </header>

    <div class="faq-list">
      @for (item of faqs; track $index) {
      <article class="faq-item" [class.open]="openIndex === $index">
        <button
          class="faq-question"
          type="button"
          (click)="toggle($index)"
          [attr.aria-expanded]="openIndex === $index"
        >
          <span class="faq-q-text">{{ item.q }}</span>
          <span class="faq-icon" aria-hidden="true"></span>
        </button>
        <div class="faq-answer">
          <p>{{ item.a }}</p>
        </div>
      </article>
      }
    </div>
  </div>
</section>
