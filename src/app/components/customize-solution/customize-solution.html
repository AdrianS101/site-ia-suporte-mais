    @if (selectedCount > 0) {
      <div class="cta-customize">
        <h3>
          {{ selectedCount }}
          {{
            selectedCount === 1 ? "módulo selecionado" : "módulos selecionados"
          }}!
        </h3>

    <div class="budget-form-section">
      <div class="form-header">
        <h3>Personalize seu Orçamento</h3>
        <p>
          Nos conte um pouco sobre a sua operação de suporte para criar a
          proposta ideal
        </p>
      </div>

      <form
        class="budget-form"
        [formGroup]="budgetForm"
        (submit)="openModal($event)"
      >
        <div class="form-grid">
          <div class="form-field">
            <label for="users">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
              </svg>
              Número de Atendentes *
            </label>
            <input
              type="number"
              id="users"
              formControlName="users"
              placeholder="Ex: 50"
              min="1"
              [class.error]="
                budgetForm.get('users')?.invalid &&
                budgetForm.get('users')?.touched
              "
            />
            @if (
              budgetForm.get("users")?.invalid &&
              budgetForm.get("users")?.touched
            ) {
              <span class="error-message">Campo obrigatório</span>
            }
          </div>

          <div class="form-field">
            <label for="monthly-volume">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
                ></path>
              </svg>
              Volume Mensal de Chamados *
            </label>
            <input
              type="number"
              id="monthly-volume"
              formControlName="monthlyVolume"
              placeholder="Ex: 5000"
              min="0"
              [class.error]="
                budgetForm.get('monthlyVolume')?.invalid &&
                budgetForm.get('monthlyVolume')?.touched
              "
            />
            @if (
              budgetForm.get("monthlyVolume")?.invalid &&
              budgetForm.get("monthlyVolume")?.touched
            ) {
              <span class="error-message">Campo obrigatório</span>
            }
          </div>

          <div class="form-field">
            <label for="dispatch-volume">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
              Canais de Abertura de Chamado *
            </label>
            <input
              type="number"
              id="dispatch-volume"
              formControlName="dispatchVolume"
              placeholder="Ex: 4"
              min="0"
              [class.error]="
                budgetForm.get('dispatchVolume')?.invalid &&
                budgetForm.get('dispatchVolume')?.touched
              "
            />
            @if (
              budgetForm.get("dispatchVolume")?.invalid &&
              budgetForm.get("dispatchVolume")?.touched
            ) {
              <span class="error-message">Campo obrigatório</span>
            }
          </div>

          <div class="form-field">
            <label for="integrations">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <polyline points="16 18 22 12 16 6"></polyline>
                <polyline points="8 6 2 12 8 18"></polyline>
              </svg>
              Sistemas para Integrar *
            </label>
            <input
              type="text"
              id="integrations"
              formControlName="integrations"
              placeholder="Ex: Jira, ServiceNow, SAP..."
              [class.error]="
                budgetForm.get('integrations')?.invalid &&
                budgetForm.get('integrations')?.touched
              "
            />
            @if (
              budgetForm.get("integrations")?.invalid &&
              budgetForm.get("integrations")?.touched
            ) {
              <span class="error-message">Campo obrigatório</span>
            }
          </div>
        </div>
      </form>

      <div style="text-align: center; margin-top: 2rem">
        <a
          href="https://wa.me/5511915192560?text=Ol%C3%A1%2C+vim+pelo+site+e+gostaria+de+saber+mais+sobre+a+IA+Suporte%2B%3F"
          class="btn-outline-white btn-large"
          style="color: #6d5efc"
        >
          Falar com especialista
        </a>
      </div>
    </div>
  </div>
</section>
